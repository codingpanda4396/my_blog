name: Deploy Content To ECS

on:
  push:
    branches:
      - master
      - main
    paths:
      - "content/**"
      - "public/covers/**"
      - "docker-compose.yml"
      - ".env.example"
      - "Caddyfile"
      - ".github/workflows/deploy-content-to-ecs.yml"
  workflow_dispatch:

concurrency:
  group: deploy-to-ecs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
          ECS_APP_DIR: ${{ secrets.ECS_APP_DIR }}
          ECS_APP_BRANCH: ${{ secrets.ECS_APP_BRANCH }}
        run: |
          set -euo pipefail
          REQUIRED_VARS=(ECS_HOST ECS_USER ECS_SSH_KEY ECS_PORT ECS_APP_DIR ECS_APP_BRANCH)
          for var in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: ${var}"
              exit 1
            fi
          done

      - name: Deploy on ECS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          passphrase: ${{ secrets.ECS_SSH_PASSPHRASE }}
          port: ${{ secrets.ECS_PORT }}
          debug: true
          script_stop: false
          script: |
            bash -se <<'EOF'
            set -Eeuxo pipefail
            trap 'echo "FAILED at line ${LINENO}: ${BASH_COMMAND}" >&2' ERR

            APP_DIR="${{ secrets.ECS_APP_DIR }}"
            APP_BRANCH="${{ secrets.ECS_APP_BRANCH }}"
            APP_REPO="${{ secrets.ECS_REPO }}"
            APP_GIT_TOKEN="${{ secrets.ECS_GIT_TOKEN }}"

            AUTH_REPO="${APP_REPO}"
            if [ -n "${APP_GIT_TOKEN}" ]; then
              case "${APP_REPO}" in
                git@github.com:*)
                  AUTH_REPO="https://x-access-token:${APP_GIT_TOKEN}@github.com/${APP_REPO#git@github.com:}"
                  ;;
                https://github.com/*)
                  AUTH_REPO="${APP_REPO/https:\/\/github.com\//https:\/\/x-access-token:${APP_GIT_TOKEN}@github.com\/}"
                  ;;
              esac
            fi

            if [ -z "${APP_DIR}" ] || [ -z "${APP_BRANCH}" ]; then
              echo "ECS_APP_DIR or ECS_APP_BRANCH is empty."
              exit 1
            fi
            if [ -z "${APP_REPO}" ]; then
              echo "ECS_REPO is empty."
              exit 1
            fi

            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"
            pwd
            ls -la

            echo "Checking runtime dependencies..."
            command -v git >/dev/null 2>&1 || { echo "git is not installed on remote host"; exit 1; }
            command -v docker >/dev/null 2>&1 || { echo "docker is not installed on remote host"; exit 1; }
            docker compose version >/dev/null 2>&1 || { echo "docker compose is not available on remote host"; exit 1; }

            if [ ! -d ".git" ]; then
              echo "No .git directory found under ${APP_DIR}."
              if [ -z "${APP_REPO}" ]; then
                echo "Missing .git in ${APP_DIR}, and ECS_REPO is empty."
                echo "Set ECS_REPO like git@github.com:owner/repo.git"
                exit 1
              fi

              DIR_CONTENTS="$(ls -A . || true)"
              case "${DIR_CONTENTS}" in
                "")
                  echo "No git repo found, directory is empty, cloning ${APP_REPO}..."
                  git clone "${AUTH_REPO}" .
                  ;;
                *)
                  echo "No git repo found, directory is not empty, bootstrapping git repo..."
                  git init
                  git remote add origin "${AUTH_REPO}"
                  if ! git fetch origin "${APP_BRANCH}"; then
                    echo "git fetch failed. If ECS_REPO uses git@github.com, configure ECS_GIT_TOKEN or add SSH deploy key on ECS host."
                    exit 1
                  fi
                  git checkout -B "${APP_BRANCH}" "origin/${APP_BRANCH}"
                  ;;
              esac
            fi

            CURRENT_ORIGIN_URL="$(git remote get-url origin 2>/dev/null || true)"
            if [ -n "${APP_GIT_TOKEN}" ]; then
              if [ -z "${CURRENT_ORIGIN_URL}" ]; then
                git remote add origin "${AUTH_REPO}"
              elif [ "${CURRENT_ORIGIN_URL}" != "${AUTH_REPO}" ]; then
                git remote set-url origin "${AUTH_REPO}"
              fi
            else
              case "${CURRENT_ORIGIN_URL}" in
                git@github.com:*)
                  echo "Current origin uses SSH (${CURRENT_ORIGIN_URL}) but ECS_GIT_TOKEN is empty."
                  echo "Configure ECS_GIT_TOKEN or install SSH deploy key on ECS host."
                  exit 1
                  ;;
              esac
            fi

            if ! git fetch origin "${APP_BRANCH}"; then
              echo "git fetch failed. If ECS_REPO uses git@github.com, configure ECS_GIT_TOKEN or add SSH deploy key on ECS host."
              exit 1
            fi
            git checkout "${APP_BRANCH}"
            git pull --ff-only origin "${APP_BRANCH}"

            if [ ! -f ".env" ]; then
              if [ -f ".env.example" ]; then
                echo ".env not found, creating from .env.example (please update production values on server)."
                cp .env.example .env
              else
                echo ".env not found and .env.example is missing."
                exit 1
              fi
            fi

            docker compose up -d --build
            docker compose ps
            EOF
