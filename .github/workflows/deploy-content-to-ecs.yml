name: Deploy Content To ECS

on:
  push:
    branches:
      - master
      - main
    paths:
      - "content/**"
      - "public/covers/**"
      - "docker-compose.yml"
      - ".env.example"
      - "Caddyfile"
      - ".github/workflows/deploy-content-to-ecs.yml"
  workflow_dispatch:

concurrency:
  group: deploy-to-ecs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
          ECS_APP_DIR: ${{ secrets.ECS_APP_DIR }}
          ECS_APP_BRANCH: ${{ secrets.ECS_APP_BRANCH }}
        run: |
          set -euo pipefail
          REQUIRED_VARS=(ECS_HOST ECS_USER ECS_SSH_KEY ECS_PORT ECS_APP_DIR ECS_APP_BRANCH)
          for var in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: ${var}"
              exit 1
            fi
          done

      - name: Deploy on ECS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          passphrase: ${{ secrets.ECS_SSH_PASSPHRASE }}
          port: ${{ secrets.ECS_PORT }}
          debug: true
          script_stop: true
          script: |
            set -euxo pipefail

            APP_DIR="${{ secrets.ECS_APP_DIR }}"
            APP_BRANCH="${{ secrets.ECS_APP_BRANCH }}"
            APP_REPO="${{ secrets.ECS_REPO }}"

            if [ -z "${APP_DIR}" ] || [ -z "${APP_BRANCH}" ]; then
              echo "ECS_APP_DIR or ECS_APP_BRANCH is empty."
              exit 1
            fi

            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"
            pwd
            ls -la

            command -v git >/dev/null 2>&1 || { echo "git is not installed on remote host"; exit 1; }
            command -v docker >/dev/null 2>&1 || { echo "docker is not installed on remote host"; exit 1; }
            docker compose version >/dev/null 2>&1 || { echo "docker compose is not available on remote host"; exit 1; }

            if [ ! -d ".git" ]; then
              if [ -z "${APP_REPO}" ]; then
                echo "Missing .git in ${APP_DIR}, and ECS_REPO is empty."
                echo "Set ECS_REPO like git@github.com:owner/repo.git"
                exit 1
              fi
              if [ -z "$(ls -A .)" ]; then
                echo "No git repo found, directory is empty, cloning ${APP_REPO}..."
                git clone "${APP_REPO}" .
              else
                echo "No git repo found, directory is not empty, bootstrapping git repo..."
                git init
                git remote add origin "${APP_REPO}"
                git fetch origin "${APP_BRANCH}"
                git checkout -B "${APP_BRANCH}" "origin/${APP_BRANCH}"
              fi
            fi

            git fetch origin "${APP_BRANCH}"
            git checkout "${APP_BRANCH}"
            git pull --ff-only origin "${APP_BRANCH}"

            docker compose up -d --build
            docker compose ps
